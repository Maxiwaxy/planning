<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Semanal — Max</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'Courier New', monospace; font-size: 14px; }

    header { padding: 20px 24px 0; border-bottom: 1px solid #222; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 16px; }
    header h1 { font-size: 18px; color: #fff; letter-spacing: 1px; }
    .week-label { font-size: 11px; color: #555; margin-top: 4px; }

    .tabs { display: flex; }
    .tab { padding: 10px 20px; font-size: 12px; color: #555; cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 1px; user-select: none; }
    .tab.active { color: #fff; border-bottom-color: #22c55e; }

    .panel { display: none; padding: 20px 24px 32px; }
    .panel.active { display: block; }

    .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .kpi-card { background: #141414; border: 1px solid #222; border-radius: 6px; padding: 14px 16px; }
    .kpi-value { font-size: 24px; font-weight: bold; color: #fff; }
    .kpi-label { font-size: 10px; color: #555; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

    .area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .card { background: #141414; border: 1px solid #222; border-radius: 6px; padding: 16px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; }
    .card-count { font-size: 10px; color: #333; }

    .area-chill-it .card-title { color: #6366f1; }
    .area-trading  .card-title { color: #f59e0b; }
    .area-personal .card-title { color: #ef4444; }
    .area-admin    .card-title { color: #22c55e; }

    .task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
    .task:last-child { border-bottom: none; }
    .task-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-pendiente { background: #333; }
    .dot-en-curso  { background: #f59e0b; animation: pulse 2s infinite; }
    .dot-hecho     { background: #22c55e; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .task-title { font-size: 12px; line-height: 1.5; color: #e0e0e0; }
    .task-title.hecho { color: #444; text-decoration: line-through; }
    .task-note { font-size: 10px; color: #444; margin-top: 2px; }
    .empty { color: #333; font-size: 12px; padding: 16px 0; text-align: center; }

    /* Leads */
    .leads-wrap { overflow-x: auto; }
    .leads-table { width: 100%; border-collapse: collapse; min-width: 520px; }
    .leads-table th { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px; text-align: left; border-bottom: 1px solid #222; white-space: nowrap; }
    .leads-table td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; font-size: 12px; vertical-align: top; }
    .leads-table tr:last-child td { border-bottom: none; }
    .contacto-name { color: #fff; font-weight: bold; }
    .local-group { font-size: 10px; color: #555; margin-top: 2px; }
    .next-step { font-size: 11px; color: #555; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; }
    .badge-contactado  { background: #1a1a2e; color: #6366f1; }
    .badge-respondio   { background: #0d2d1a; color: #22c55e; }
    .badge-reunion     { background: #1a2d0d; color: #84cc16; }
    .badge-demo        { background: #2d1a0d; color: #f59e0b; }
    .badge-negociacion { background: #2d1a1a; color: #ef4444; }
    .badge-cerrado     { background: #0d2d0d; color: #22c55e; }
    .badge-descartado  { background: #1a1a1a; color: #444; }

    /* Meta bar */
    .meta-card { margin-top: 12px; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; }
    .meta-big { font-size: 28px; font-weight: bold; color: #fff; }
    .meta-info { text-align: right; }
    .meta-sub { font-size: 11px; color: #555; }
    .progress-track { height: 4px; background: #1a1a1a; border-radius: 2px; margin-top: 8px; }
    .progress-fill  { height: 4px; background: #22c55e; border-radius: 2px; transition: width 0.6s; }

    .footer { padding: 0 24px 24px; font-size: 10px; color: #2a2a2a; text-align: right; }

    @media (max-width: 600px) {
      .area-grid  { grid-template-columns: 1fr; }
      .kpi-strip  { grid-template-columns: 1fr 1fr; }
      .panel      { padding: 16px 16px 24px; }
      header      { padding: 16px 16px 0; }
      header h1   { font-size: 15px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>Planning Semanal</h1>
      <div class="week-label" id="weekLabel">—</div>
    </div>
    <div style="font-size:10px; color:#333; text-align:right; margin-top:4px;" id="headerMeta"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('semana')">Semana</div>
    <div class="tab" onclick="switchTab('leads')">Leads</div>
  </div>
</header>

<!-- SEMANA -->
<div class="panel active" id="panel-semana">
  <div class="kpi-strip" id="kpiStrip"></div>
  <div class="area-grid" id="areaGrid"></div>
</div>

<!-- LEADS -->
<div class="panel" id="panel-leads">
  <div class="card">
    <div class="card-header">
      <span class="card-title" style="color:#6366f1">Pipeline de Leads — Chill It Madrid</span>
      <span class="card-count" id="leadsCount"></span>
    </div>
    <div class="leads-wrap">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Contacto</th>
            <th>Local</th>
            <th>Estado</th>
            <th>Referido por</th>
            <th>Próximo paso</th>
          </tr>
        </thead>
        <tbody id="leadsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card meta-card">
    <div class="card-header">
      <span class="card-title" style="color:#22c55e">Meta Anual 2026</span>
    </div>
    <div class="meta-row">
      <div>
        <div class="meta-big" id="metaCount">0</div>
        <div class="meta-sub">máquinas instaladas</div>
      </div>
      <div class="meta-info">
        <div class="meta-sub">Meta: 315 máquinas</div>
        <div style="font-size:10px; color:#333; margin-top:3px;">31 dic 2026</div>
        <div class="progress-track" style="width:140px; margin-top:8px;">
          <div class="progress-fill" id="metaBar" style="width:0%"></div>
        </div>
        <div style="font-size:10px; color:#333; margin-top:4px;" id="metaPct">0%</div>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="footerUpdate"></div>

<script>
const WEEK_URL  = 'data/week.json';
const LEADS_URL = 'data/leads.json';

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

const AREA_CONFIG = {
  'chill-it': { label: 'Chill It',  cls: 'area-chill-it' },
  'trading':  { label: 'Trading',   cls: 'area-trading'  },
  'personal': { label: 'Personal',  cls: 'area-personal' },
  'admin':    { label: 'Admin',     cls: 'area-admin'    },
};

const LEAD_BADGE = {
  'Contactado':  'badge-contactado',
  'Respondió':   'badge-respondio',
  'Reunión':     'badge-reunion',
  'Demo':        'badge-demo',
  'Negociación': 'badge-negociacion',
  'Cerrado':     'badge-cerrado',
  'Descartado':  'badge-descartado',
};

async function loadWeek() {
  const data = await fetch(WEEK_URL + '?t=' + Date.now()).then(r => r.json());

  document.getElementById('weekLabel').textContent = data.week + ' · ' + data.dates;

  let total = 0, done = 0, inProgress = 0;
  for (const tasks of Object.values(data.areas)) {
    for (const t of tasks) {
      total++;
      if (t.status === 'hecho')    done++;
      if (t.status === 'en-curso') inProgress++;
    }
  }

  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi-card"><div class="kpi-value">${total}</div><div class="kpi-label">Tareas</div></div>
    <div class="kpi-card"><div class="kpi-value" style="color:#22c55e">${done}</div><div class="kpi-label">Completadas</div></div>
    <div class="kpi-card"><div class="kpi-value" style="color:#f59e0b">${inProgress}</div><div class="kpi-label">En curso</div></div>
    <div class="kpi-card"><div class="kpi-value" style="color:#555">${total - done - inProgress}</div><div class="kpi-label">Pendientes</div></div>
  `;

  const grid = document.getElementById('areaGrid');
  grid.innerHTML = '';
  for (const [key, cfg] of Object.entries(AREA_CONFIG)) {
    const tasks = data.areas[key] || [];
    const doneN = tasks.filter(t => t.status === 'hecho').length;
    grid.innerHTML += `
      <div class="card ${cfg.cls}">
        <div class="card-header">
          <span class="card-title">${cfg.label}</span>
          <span class="card-count">${doneN}/${tasks.length}</span>
        </div>
        ${tasks.length === 0
          ? '<div class="empty">Sin tareas</div>'
          : tasks.map(t => `
            <div class="task">
              <div class="task-dot dot-${t.status}"></div>
              <div>
                <div class="task-title ${t.status === 'hecho' ? 'hecho' : ''}">${t.title}</div>
                ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
              </div>
            </div>`).join('')
        }
      </div>`;
  }

  document.getElementById('footerUpdate').textContent = 'Actualizado: ' + data.updatedAt;
}

async function loadLeads() {
  const data = await fetch(LEADS_URL + '?t=' + Date.now()).then(r => r.json());

  document.getElementById('leadsCount').textContent = data.leads.length + ' leads';

  document.getElementById('leadsBody').innerHTML = data.leads.map(l => `
    <tr>
      <td><div class="contacto-name">${l.contacto}</div></td>
      <td>
        <div>${l.local}</div>
        ${l.grupo ? `<div class="local-group">${l.grupo}</div>` : ''}
      </td>
      <td><span class="badge ${LEAD_BADGE[l.estado] || ''}">${l.estado}</span></td>
      <td style="color:#555; font-size:11px;">${l.referido || '—'}</td>
      <td><div class="next-step">${l.nextStep || '—'}</div></td>
    </tr>`).join('');

  const m = data.machinesInstalled || 0;
  const pct = Math.min(Math.round(m / 315 * 100), 100);
  document.getElementById('metaCount').textContent = m;
  document.getElementById('metaBar').style.width = pct + '%';
  document.getElementById('metaPct').textContent = pct + '% de la meta';
}

Promise.all([loadWeek(), loadLeads()]);
</script>
</body>
</html>
